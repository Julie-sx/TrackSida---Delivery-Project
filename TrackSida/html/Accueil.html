<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracksida – Sid'Alert</title>
  <link rel= "stylesheet" href="../css/style.css">
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <a href="#" class="logo">Tracksida</a>
    <button class="notif-btn" aria-label="Notifications">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="notif-badge">56</span>
    </button>
  </header>

  <!-- MAIN -->
  <main>

    <!-- Page title -->
    <button class="page-title-wrap">
      <h1 class="page-title">Sid'Alert</h1>
    </button>

    <br>

    <!-- Bloc Dép-IST -->
    <div class="block">
      <div class="block-header">
        <span class="block-icon">📍</span>
        <span class="block-title">Dép-IST</span>
      </div>
      <p class="block-desc">Trouve un centre de dépistage proche de chez toi !</p>
          <div class="block-cta">
        <button class="btn-action">Carte</button>
      </div>
    </div>

    <!-- Bloc Contacts -->
    <div class="block">
      <div class="block-header">
        <span class="block-icon">👥</span>
        <span class="block-title">Contacts</span>
      </div>
      <p class="block-desc">Consulte et référence tes partenaires</p>
      <div class="block-cta">
        <button class="btn-action">Ajouter</button>
      </div>
    </div>

    <!-- Bloc S'informer -->
    <div class="block">
      <div class="block-header">
        <span class="block-icon">❓</span>
        <span class="block-title">S'informer</span>
      </div>
      <p class="block-desc">En savoir plus sur les IST</p>
      <div class="block-cta">
        <button class="btn-action">Explorer</button>
      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <button class="footer-btn active" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      Menu
    </button>

    <button class="footer-center" aria-label="Ajouter">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7B7FD4" stroke-width="2.8" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>

    <button class="footer-btn" aria-label="Profil">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profil
    </button>
  </footer>

</div>
</body>
</html>
